<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Tuner</title>
    <link rel="icon" type="image/svg+xml" href="./icon-192.svg" />
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="color-scheme" content="dark">
    <link rel="apple-touch-icon" href="./icon-192.svg">
  </head>
  <body>
    <a href="#tuner-main" class="skip-link">Skip to content</a>
    <div id="app">
      <header class="app-header" role="banner">
        <h1>Tuner</h1>
      </header>

      <main id="tuner-main" class="tuner-main" role="main">
        <div class="gauge-container">
          <!-- SVG gauge mounts here -->
        </div>
        <div class="note-display">
          <!-- note readout mounts here -->
        </div>
      </main>

      <footer class="tuner-controls" role="contentinfo">
        <div class="string-selector">
          <!-- string buttons mount here -->
        </div>
        <div class="action-buttons">
          <!-- start/stop, play tone buttons -->
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
